<mat-toolbar color="primary" *ngIf="authService.isLoggedIn()">
  <span class="brand">Task Management System</span>

  <!-- Bu boşluk bırakıcı, menü elemanlarını sağa iter -->
  <span class="spacer"></span>

  <!-- Yönlendirme butonlarımız -->
  <button mat-button routerLink="/dashboard" routerLinkActive="active" class="nav-link">Dashboard</button>
  <button mat-button routerLink="/tasks" routerLinkActive="active" class="nav-link">Görevler</button>
  <button mat-button routerLink="/categories" routerLinkActive="active" class="nav-link">Kategoriler</button>

  <button mat-icon-button (click)="toggleTheme()" [attr.aria-label]="themeService.isDarkMode() ? 'Açık temaya geç' : 'Koyu temaya geç'">
    <mat-icon>{{ themeService.isDarkMode() ? 'dark_mode' : 'light_mode' }}</mat-icon>
  </button>

  <button mat-button [matMenuTriggerFor]="userMenu" class="user-menu-trigger">
    <mat-icon>account_circle</mat-icon>
    <span class="user-name">{{ displayName || 'Hesabım' }}</span>
  </button>
  <mat-menu #userMenu="matMenu">
    <button mat-menu-item routerLink="/profile">
      <mat-icon>person</mat-icon>
      <span>Profilim</span>
    </button>
    <button mat-menu-item (click)="onLogout()">
      <mat-icon>logout</mat-icon>
      <span>Çıkış Yap</span>
    </button>
  </mat-menu>
</mat-toolbar>
