<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>Giriş Yap</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">

        <div class="register-prompt">
          <span>Hesabın yok mu?</span>
          <a mat-button color="accent" routerLink="/register">Hemen Kayıt Ol</a>
        </div>

        <div *ngIf="errorMessage" class="alert error">{{ errorMessage }}</div>

        <!-- E-posta alanı -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>E-posta</mat-label>
          <input matInput type="email" formControlName="email" placeholder="ornek@mail.com">
          <mat-error *ngIf="loginForm.get('email')?.hasError('required')">
            E-posta alanı zorunludur.
          </mat-error>
          <mat-error *ngIf="loginForm.get('email')?.hasError('email')">
            Geçerli bir e-posta adresi giriniz.
          </mat-error>
        </mat-form-field>

        <!-- Şifre alanı -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Şifre</mat-label>
          <input matInput type="password" formControlName="password">
          <mat-error *ngIf="loginForm.get('password')?.hasError('required')">
            Şifre alanı zorunludur.
          </mat-error>
          <mat-error *ngIf="loginForm.get('password')?.hasError('minlength')">
            Şifre en az 6 karakter olmalıdır.
          </mat-error>
        </mat-form-field>

        <button mat-flat-button color="primary" type="submit" [disabled]="loginForm.invalid || isLoading" class="full-width submit-btn">
          <mat-spinner *ngIf="isLoading" diameter="20"></mat-spinner>
          <span>{{ isLoading ? 'Giriş yapılıyor...' : 'Giriş Yap' }}</span>
        </button>

      </form>
    </mat-card-content>
  </mat-card>
</div>
