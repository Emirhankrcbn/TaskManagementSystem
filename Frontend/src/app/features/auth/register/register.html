<div class="register-container">
  <mat-card class="register-card">
    <mat-card-header>
      <mat-card-title>Yeni Hesap Oluştur</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="register-form">
        
        <!-- Kullanıcı Adı Alanı -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Kullanıcı Adı</mat-label>
          <input matInput formControlName="username" placeholder="Kullanıcı adınızı belirleyin" required>
          <mat-error *ngIf="registerForm.get('username')?.hasError('required')">
            Kullanıcı adı zorunludur.
          </mat-error>
        </mat-form-field>

        <!-- Ad Alanı -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Ad</mat-label>
          <input matInput formControlName="firstName" placeholder="Adınızı girin" required>
          <mat-error *ngIf="registerForm.get('firstName')?.hasError('required')">
            Ad alanı zorunludur.
          </mat-error>
        </mat-form-field>

        <!-- Soyad Alanı -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Soyad</mat-label>
          <input matInput formControlName="lastName" placeholder="Soyadınızı girin" required>
          <mat-error *ngIf="registerForm.get('lastName')?.hasError('required')">
            Soyad alanı zorunludur.
          </mat-error>
        </mat-form-field>

        <!-- E-posta Alanı -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>E-posta</mat-label>
          <input matInput type="email" formControlName="email" placeholder="ornek@mail.com">
          <mat-error *ngIf="registerForm.get('email')?.hasError('required')">
            E-posta alanı zorunludur.
          </mat-error>
          <mat-error *ngIf="registerForm.get('email')?.hasError('email')">
            Geçerli bir e-posta adresi giriniz.
          </mat-error>
        </mat-form-field>

        <!-- Şifre Alanı -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Şifre</mat-label>
          <input matInput type="password" formControlName="password">
          <mat-error *ngIf="registerForm.get('password')?.hasError('required')">
            Şifre alanı zorunludur.
          </mat-error>
          <mat-error *ngIf="registerForm.get('password')?.hasError('minlength')">
            Şifre en az 6 karakter olmalıdır.
          </mat-error>
        </mat-form-field>

        <div *ngIf="errorMessage" class="alert error">{{ errorMessage }}</div>

        <button mat-flat-button color="primary" type="submit" [disabled]="registerForm.invalid || isLoading" class="full-width submit-btn">
          <mat-spinner *ngIf="isLoading" diameter="20"></mat-spinner>
          <span>{{ isLoading ? 'Kayıt olunuyor...' : 'Kayıt Ol' }}</span>
        </button>

      </form>
    </mat-card-content>
  </mat-card>
</div>
