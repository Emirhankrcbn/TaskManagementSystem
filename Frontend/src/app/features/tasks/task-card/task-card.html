<div class="task-card-row">
  <div class="task-card-info">
    <span class="task-card-title">{{ task.title }}</span>
    <span class="task-card-meta">
      <ng-container *ngIf="task.category">
        <span class="color-dot" [style.backgroundColor]="task.category.color"></span>
        {{ task.category.name }} ·
      </ng-container>
      Öncelik: {{ getPriorityLabel(task.priority) }}
    </span>
  </div>

  <span *ngIf="badgeText" class="task-card-badge" [class.danger]="badgeVariant === 'danger'">
    {{ badgeText }}
  </span>
</div>
